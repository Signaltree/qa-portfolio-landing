<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3A6B35"/>
      <stop offset="50%" stop-color="#5B8C3E"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#5B8C3E"/>
      <stop offset="100%" stop-color="#3A6B35"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3A6B35" stop-opacity=".3"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity=".15"/>
    </linearGradient>
  </defs>

  <!-- Círculo exterior sutil -->
  <circle cx="100" cy="100" r="92" stroke="url(#g1)" stroke-width="1.5" opacity=".4"/>

  <!-- Hoja digital (naturaleza + circuito) -->
  <path d="M100 30 C130 30 165 60 170 100 C175 140 155 165 130 175 C145 155 155 130 150 100 C145 70 125 50 100 45Z"
        fill="url(#g3)" stroke="url(#g1)" stroke-width="1.2" opacity=".7"/>

  <!-- Círculo central (engranaje abstracto) -->
  <circle cx="100" cy="100" r="28" stroke="url(#g2)" stroke-width="1.5" fill="none" opacity=".8"/>
  <circle cx="100" cy="100" r="16" stroke="url(#g1)" stroke-width="1.2" fill="none"/>

  <!-- Dientes del engranaje (automatización) -->
  <g stroke="url(#g1)" stroke-width="2" opacity=".6">
    <line x1="100" y1="62" x2="100" y2="56"/>
    <line x1="100" y1="138" x2="100" y2="144"/>
    <line x1="62" y1="100" x2="56" y2="100"/>
    <line x1="138" y1="100" x2="144" y2="100"/>
    <line x1="73" y1="73" x2="69" y2="69"/>
    <line x1="127" y1="127" x2="131" y2="131"/>
    <line x1="73" y1="127" x2="69" y2="131"/>
    <line x1="127" y1="73" x2="131" y2="69"/>
  </g>

  <!-- Punto central -->
  <circle cx="100" cy="100" r="4" fill="url(#g1)"/>

  <!-- Trazos de circuito (lado tech) -->
  <g stroke="url(#g1)" stroke-width="1.2" opacity=".5">
    <polyline points="132,82 155,75 165,80" fill="none"/>
    <polyline points="135,115 150,120 160,115" fill="none"/>
    <polyline points="75,40 70,25 80,20" fill="none"/>
    <circle cx="165" cy="80" r="2" fill="#3B82F6"/>
    <circle cx="160" cy="115" r="2" fill="#3B82F6"/>
  </g>

  <!-- Partículas orgánicas (lado naturaleza) -->
  <g fill="url(#g1)" opacity=".35">
    <circle cx="55" cy="65" r="3"/>
    <circle cx="45" cy="90" r="2"/>
    <circle cx="50" cy="135" r="2.5"/>
    <circle cx="65" cy="160" r="2"/>
    <circle cx="145" cy="155" r="2"/>
  </g>

  <!-- Ramos/ramas orgánicas sutiles -->
  <g stroke="url(#g1)" stroke-width="1" opacity=".3" fill="none">
    <path d="M60 150 C50 140 45 125 55 115"/>
    <path d="M55 115 C60 110 58 105 50 108"/>
    <path d="M75 165 C65 170 55 165 50 155"/>
  </g>
</svg>
